name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install npm dependencies
        run: npm ci

      - name: Run Rust tests
        run: cargo test --workspace --exclude relaxng-validator-python

      - name: Run end-to-end tests
        run: bash tests/run_validator_cases.sh

      - name: Run WASM/TypeScript tests
        run: npm test

      - name: Create virtual environment and install test dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install maturin pytest

      - name: Build and install Python extension
        run: .venv/bin/maturin develop

      - name: Run Python tests
        run: .venv/bin/pytest python-api/tests -v
