name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install npm dependencies
        run: npm ci

      - name: Run Rust tests
        run: cargo test --workspace --exclude relaxng-validator-python

      - name: Run end-to-end tests
        run: bash tests/run_validator_cases.sh

      - name: Run WASM/TypeScript tests
        run: npm test

      - name: Create virtual environment and install test dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install maturin pytest

      - name: Build and install Python extension
        run: .venv/bin/maturin develop

      - name: Run Python tests
        run: .venv/bin/pytest python-api/tests -v

      - name: Build Python wheel
        run: .venv/bin/maturin build --release

      - name: Create WASM package zip
        run: zip -r wasm-api-pkg.zip wasm-api/pkg

      - name: Upload Python wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-wheel
          path: target/wheels/*.whl
          if-no-files-found: error

      - name: Upload WASM package artifact
        uses: actions/upload-artifact@v7
        with:
          name: wasm-api-pkg-zip
          path: wasm-api-pkg.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check tag commit is on main
        id: main_check
        run: |
          git fetch origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Tag commit is not on main; skipping release."
          fi

      - name: Download Python wheel artifact
        if: steps.main_check.outputs.publish == 'true'
        uses: actions/download-artifact@v8
        with:
          name: python-wheel
          path: release-assets

      - name: Download WASM package artifact
        if: steps.main_check.outputs.publish == 'true'
        uses: actions/download-artifact@v8
        with:
          name: wasm-api-pkg-zip
          path: release-assets

      - name: Create GitHub release and upload assets
        if: steps.main_check.outputs.publish == 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release-assets/*.whl
            release-assets/wasm-api-pkg.zip

  deploy-playground-pages:
    name: Deploy Playground to GitHub Pages
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download WASM package artifact
        uses: actions/download-artifact@v8
        with:
          name: wasm-api-pkg-zip

      - name: Unpack WASM package
        run: unzip -o wasm-api-pkg.zip

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build playground app
        run: npm run build:web

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: validator-playground/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
